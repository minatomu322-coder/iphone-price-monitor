services:
  # ダッシュボード（http://localhost:8000）
  dashboard:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./config:/app/config

  # 巡回ワーカー（60分ごとに1回実行）
  finder:
    build: .
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    command: >
      sh -c "while true; do
        python -m rakuten_finder.cli run;
        sleep 3600;
      done"
