# CRM（親密度・再交流）
relationship:
  # 交流種別ごとの親密度加点
  # 自分の行動: like / reply(リプ送信) / follow / dm / meet
  # 相手の反応(KPIイベント): reply_received(返信された) / followback / consult(相談) / deal(成約)
  points:
    like: 2
    reply: 6
    follow: 4
    dm: 15
    meet: 30
    reply_received: 10
    followback: 8
    consult: 25
    deal: 40
  # 1日あたりの親密度自然減衰（放置すると関係が冷める→再交流アラート）
  decay_per_day: 0.7
  # ★ランク別の推奨再交流サイクル（日）。上位ほど短い間隔で接触。
  cadence_days: {5: 2, 4: 4, 3: 7, 2: 14, 1: 30}
